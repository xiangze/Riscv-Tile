# =============================================================================
#  .github/workflows/ci.yml
#  GitHub Actions CI  ―  Docker コンテナ上でビルド＆テストを実行
# =============================================================================

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Docker イメージのビルド＆プッシュ ────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # riscv-tests + riscv-test-env を一括取得

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── イメージキャッシュ（GitHub Actions Cache） ─────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: tile-riscv:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      # キャッシュの rotate（古いキャッシュが肥大化するのを防ぐ）
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ── riscv-tests hex ビルド ─────────────────────────────────────────────────
  build-tests:
    name: Build riscv-tests hex
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}

      - name: Load image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: tile-riscv:ci
          cache-from: type=local,src=/tmp/.buildx-cache

      - name: Build hex files
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            tile-riscv:ci \
            make -C tests

      # ── hex ファイルを後続ジョブに渡す ────────────────────────────────────
      - name: Upload hex artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-hex
          path: tests/hex/
          retention-days: 1

  # ── RV32UI テスト ─────────────────────────────────────────────────────────
  test-rv32ui:
    name: RV32UI Tests
    runs-on: ubuntu-latest
    needs: build-tests

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # hex は artifact から取得

      - name: Restore Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}

      - name: Load image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: tile-riscv:ci
          cache-from: type=local,src=/tmp/.buildx-cache

      - name: Download hex artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-hex
          path: tests/hex/

      # SBT キャッシュ（ivy / coursier）
      - name: Cache SBT
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt') }}

      - name: Run rv32ui tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -v $HOME/.ivy2:/root/.ivy2 \
            -v $HOME/.sbt:/root/.sbt \
            -v $HOME/.cache/coursier:/root/.cache/coursier \
            tile-riscv:ci \
            sbt "testOnly tileriscv.RV32UITests"

  # ── RV32UM テスト ─────────────────────────────────────────────────────────
  test-rv32um:
    name: RV32UM Tests
    runs-on: ubuntu-latest
    needs: build-tests

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Restore Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}

      - name: Load image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: tile-riscv:ci
          cache-from: type=local,src=/tmp/.buildx-cache

      - name: Download hex artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-hex
          path: tests/hex/

      - name: Cache SBT
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt') }}

      - name: Run rv32um tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -v $HOME/.ivy2:/root/.ivy2 \
            -v $HOME/.sbt:/root/.sbt \
            -v $HOME/.cache/coursier:/root/.cache/coursier \
            tile-riscv:ci \
            sbt "testOnly tileriscv.RV32UMTests"

  # ── SystemVerilog 生成 ────────────────────────────────────────────────────
  verilog:
    name: Generate SystemVerilog
    runs-on: ubuntu-latest
    needs: [ test-rv32ui, test-rv32um ]

    steps:
      - uses: actions/checkout@v4

      - name: Restore Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}

      - name: Load image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: tile-riscv:ci
          cache-from: type=local,src=/tmp/.buildx-cache

      - name: Cache SBT
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt') }}

      - name: Generate SystemVerilog
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -v $HOME/.ivy2:/root/.ivy2 \
            -v $HOME/.sbt:/root/.sbt \
            tile-riscv:ci \
            sbt run

      - name: Upload generated Verilog
        uses: actions/upload-artifact@v4
        with:
          name: generated-verilog
          path: generated/
          retention-days: 7

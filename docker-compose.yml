# =============================================================================
#  docker-compose.yml  ―  tile-riscv 開発ワークフロー
#
#  使い方:
#    docker compose run --rm build       # テスト hex をビルド
#    docker compose run --rm test        # ChiselTest 実行
#    docker compose run --rm verilog     # SystemVerilog 生成
#    docker compose run --rm shell       # インタラクティブシェル
#    docker compose run --rm all         # ビルド → テスト → Verilog 一括
# =============================================================================

services:

  # ── 共通設定（他サービスが extends で参照） ─────────────────────────────────
  base: &base
    build:
      context: .
      dockerfile: Dockerfile
    image: tile-riscv:latest
    volumes:
      # ソースをマウント（コンテナ内の変更はホストに反映される）
      - .:/work
      # SBT キャッシュをボリュームで永続化（毎回の依存解決を回避）
      - sbt-cache:/root/.sbt
      - ivy-cache:/root/.ivy2
      - coursier-cache:/root/.cache/coursier
    working_dir: /work
    # ── git "dubious ownership" 対策 ────────────────────────────────────────
    # ホストのファイルをマウントするとコンテナ内 root とオーナーが異なり
    # "fatal: detected dubious ownership in repository at '/work'" が出る。
    #
    # 問題: safe.directory=/work だけでは nested submodule
    #   /work/riscv-tests, /work/riscv-tests/env にアクセスする際に
    #   再度エラーが起きる。
    # 解決: git submodule update の前に --global safe.directory '*' を設定し
    #   全ディレクトリを許可する（コンテナ内限定なのでリスクは低い）。
    environment:
      - HOME=/root

  # ── riscv-tests から hex を生成 ─────────────────────────────────────────────
  build:
    <<: *base
    command: >
      bash -c "
        git config --global --add safe.directory '*' &&
        echo '=== Initializing submodules ===' &&
        git submodule update --init --recursive &&
        echo '=== Building test hex files ===' &&
        make -C tests
      "

  # ── ChiselTest でテスト実行 ─────────────────────────────────────────────────
  test:
    <<: *base
    command: sbt test

  # ── rv32ui のみテスト ────────────────────────────────────────────────────────
  test-ui:
    <<: *base
    command: sbt "testOnly tileriscv.RV32UITests"

  # ── rv32um のみテスト ────────────────────────────────────────────────────────
  test-um:
    <<: *base
    command: sbt "testOnly tileriscv.RV32UMTests"

  # ── SystemVerilog 生成 ───────────────────────────────────────────────────────
  verilog:
    <<: *base
    command: sbt run

  # ── ビルド → テスト → Verilog 一括実行 ──────────────────────────────────────
  all:
    <<: *base
    command: >
      bash -c "
        git config --global --add safe.directory '*' &&
        git submodule update --init --recursive &&
        make -C tests &&
        sbt test &&
        sbt run
      "

  # ── インタラクティブ開発シェル ───────────────────────────────────────────────
  shell:
    <<: *base
    stdin_open: true
    tty: true
    command: bash

# ── ボリューム定義 ────────────────────────────────────────────────────────────
volumes:
  sbt-cache:
  ivy-cache:
  coursier-cache:
